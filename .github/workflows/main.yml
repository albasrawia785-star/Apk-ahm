name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Unzip Project Files
      run: |
        unzip X.zip -d unzipped_project
        # نقل الملفات للمجلد الرئيسي إذا كان الضغط يحتوي مجلداً داخلياً
        if [ -d "unzipped_project/app" ]; then
          cp -r unzipped_project/* .
        elif [ -d "unzipped_project/"*"/app" ]; then
          cp -r unzipped_project/*/* .
        fi

    - name: Make Gradle Executable
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
