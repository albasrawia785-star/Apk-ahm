name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Unzip Project Files
      run: |
        unzip X.zip -d project_dir

    - name: Find Gradle and Build APK
      run: |
        # البحث عن المجلد الذي يحتوي على ملف gradlew والدخول إليه
        GRADLE_DIR=$(find project_dir -name gradlew -exec dirname {} \;)
        echo "Found gradlew in: $GRADLE_DIR"
        cd "$GRADLE_DIR"
        
        # إعطاء صلاحيات التنفيذ وتشغيل البناء
        chmod +x gradlew
        ./gradlew assembleDebug
        
        # نقل ملف الـ APK الناتج إلى المجلد الرئيسي لسهولة رفعه
        mkdir -p $GITHUB_WORKSPACE/output
        cp app/build/outputs/apk/debug/*.apk $GITHUB_WORKSPACE/output/

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: output/*.apk
