name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Unzip Project Files
      run: |
        unzip X.zip -d project_dir

    - name: Build APK
      run: |
        # البحث عن المجلد الذي يحتوي على ملف build.gradle أو build.gradle.kts
        BUILD_DIR=$(find project_dir -name "build.gradle*" -exec dirname {} \; | head -n 1)
        echo "Found project build file in: $BUILD_DIR"
        cd "$BUILD_DIR"
        
        # التحقق مما إذا كان gradlew موجوداً، وإذا لم يكن موجوداً نستخدم مثبت النظام
        if [ -f "gradlew" ]; then
          echo "Using project gradlew wrapper..."
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "gradlew not found. Using system gradle..."
          gradle assembleDebug
        fi
        
        # إنشاء مجلد المخرجات ونقل ملف الـ APK إليه
        mkdir -p $GITHUB_WORKSPACE/output
        find . -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/output/ \;

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: output/*.apk
